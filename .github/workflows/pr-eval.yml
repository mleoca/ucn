name: PR Eval Gate

# Fast contract gate on every PR/push: oracle eval on the two quickest
# ground-truth repos (preact-signals via ts-morph, httpx via pyright —
# no Go/Rust/Java toolchains needed, ~2 min total). Fails on:
#  - semantic-missing > 0 (an indexed oracle call edge not actually shown in
#    confirmed/unverified; conserving it in a count is no longer enough)
#  - tier-1 precision below the floor (locks the measured numbers in:
#    both fast-gate repos now measure 100% — a 98% floor blocks material drift)
# The full 6-repo battery stays in eval.yml (weekly + dispatch).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  oracle-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Oracle eval gate (preact-signals + httpx)
        run: npm run trust:gate:fast

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pr-eval-reports
          path: eval/reports/
          retention-days: 30
