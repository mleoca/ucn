name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write  # Required for MCP Registry OIDC authentication

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "CI"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install gopls (Go release oracle)
        run: |
          go install golang.org/x/tools/gopls@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install rust-analyzer (Rust release oracle)
        run: rustup component add rust-analyzer rust-src

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install jdtls (Java release oracle)
        run: |
          curl -fsSL -o /tmp/jdtls.tar.gz "https://download.eclipse.org/jdtls/milestones/1.60.0/jdt-language-server-1.60.0-202606262232.tar.gz"
          echo "e94c303d8198f977930803582738771fd18c52c5492878410bf222b1aa81ef1d  /tmp/jdtls.tar.gz" | sha256sum -c
          mkdir -p "$HOME/jdtls" && tar -xzf /tmp/jdtls.tar.gz -C "$HOME/jdtls"
          echo "UCN_EVAL_JDTLS=$HOME/jdtls/bin/jdtls" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Release trust gate (one compiler/LSP board per language)
        run: npm run trust:gate

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # --allow-same-version: the release flow (npm version + push --follow-tags)
          # commits the real version, so the tag usually EQUALS package.json already
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" server.json

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" server.json

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install mcp-publisher
        run: |
          curl -sL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz | tar xz
          sudo mv mcp-publisher /usr/local/bin/

      - name: Authenticate with MCP Registry via OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
