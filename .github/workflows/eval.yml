name: Eval

# Reliability/accuracy evaluation on pinned real repos:
#  - conservation: account invariant + engine-gap metrics (6 repos, 6 languages)
#  - oracle: tiered caller answers vs compiler/LSP ground truth (ts-morph for
#    TS repos; pyright-langserver over LSP for Python, jedi available as a
#    second opinion via --oracle jedi with a self-bootstrapping venv; gopls
#    for Go; rust-analyzer for Rust; jdtls for Java);
#    fails when missing-unexplained > 0 (the contract gate)
#  - deadcode: every deadcode claim checked for oracle references — fails
#    when a default-arm claim has a reference UCN missed (false-dead gate)
# Separate from ci.yml: heavier, network-dependent, weekly + on demand.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install gopls (Go oracle)
        run: |
          go install golang.org/x/tools/gopls@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install rust-analyzer (Rust oracle)
        run: |
          rustup component add rust-analyzer rust-src
          rust-analyzer --version

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install jdtls (Java oracle)
        run: |
          curl -fsSL -o /tmp/jdtls.tar.gz "https://download.eclipse.org/jdtls/milestones/1.58.0/jdt-language-server-1.58.0-202604151538.tar.gz"
          echo "2a5bbe55ec91b4325392050dc422cead3220a2459b3766be35e1fff45b4a50d9  /tmp/jdtls.tar.gz" | sha256sum -c
          mkdir -p "$HOME/jdtls" && tar -xzf /tmp/jdtls.tar.gz -C "$HOME/jdtls"
          echo "UCN_EVAL_JDTLS=$HOME/jdtls/bin/jdtls" >> "$GITHUB_ENV"

      - run: npm ci

      - name: Conservation eval (pinned repos)
        run: node eval/conservation-real.js

      - name: "Oracle eval (gate: missing-unexplained = 0)"
        run: node eval/run-oracle-eval.js

      - name: "Fresh-repo oracle eval (2 unpinned repos, weekly rotation — generalization gate)"
        run: node eval/run-oracle-eval.js --fresh 2

      - name: "Deadcode eval (gate: default-arm false-dead = 0)"
        run: node eval/run-deadcode-eval.js --sample 300

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: eval/reports/
          retention-days: 90
